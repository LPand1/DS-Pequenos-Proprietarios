<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imóvel — Gerenciador de Imóveis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:       #0A0A0A;
        --surface:  #111111;
        --surface2: #1A1A1A;
        --border:   #2A2A2A;
        --teal:     #0D9488;
        --teal-lt:  #2DD4BF;
        --text:     #F0F0F0;
        --muted:    #6B7280;
        --radius:   10px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .logo {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--teal-lt);
      }
      nav { display: flex; gap: 1.5rem; align-items: center; }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.15s;
      }
      nav a:hover { color: var(--text); }
      nav a.danger:hover { color: #EF4444; }

      main {
        flex: 1;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      @media (min-width: 900px) {
        main { flex-direction: row; align-items: flex-start; }
      }

      .col-left { width: 100%; }
      @media (min-width: 900px) { .col-left { width: 320px; flex-shrink: 0; } }

      .imovel-header { margin-bottom: 1rem; }
      .imovel-nome {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text);
        cursor: pointer;
        display: inline-block;
        border-bottom: 2px solid transparent;
        transition: border-color 0.15s;
        line-height: 1.3;
      }
      .imovel-nome:hover { border-bottom-color: var(--teal); }
      #info-inquilino {
        font-size: 0.8rem;
        color: var(--teal-lt);
        font-family: 'JetBrains Mono', monospace;
        margin-top: 0.3rem;
      }

      .photo-wrap {
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        position: relative;
      }
      #foto-imovel {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
      }
      #label-foto {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.75rem;
        padding: 0.45rem 0.9rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }
      #label-foto:hover { border-color: var(--teal); color: var(--text); }

      .pdf-section {
        margin-top: 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
      }
      .section-title {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1.25rem;
      }

      .pdf-form { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }
      .pdf-form .field-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.3rem;
        display: block;
      }
      .pdf-form input[type="text"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        padding: 0.6rem 0.8rem;
        outline: none;
        transition: border-color 0.15s;
      }
      .pdf-form input[type="text"]:focus { border-color: var(--teal); }

      .file-pick-label {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.6rem 0.8rem;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .file-pick-label:hover { border-color: var(--teal); }
      #label-pdf-texto {
        font-size: 0.8rem;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      #progresso-upload { display: none; }
      #progresso-upload .bar-bg {
        background: var(--surface2);
        border-radius: 99px;
        height: 4px;
        overflow: hidden;
      }
      #barra-progresso {
        background: var(--teal);
        height: 4px;
        border-radius: 99px;
        width: 0%;
        transition: width 0.3s;
      }
      #texto-progresso { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

      #btn-upload-pdf {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.6rem 1rem;
        background: var(--teal);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.15s;
      }
      #btn-upload-pdf:hover { background: #0F766E; }
      #btn-upload-pdf:disabled { opacity: 0.5; cursor: not-allowed; }

      #lista-arquivos { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
      #lista-arquivos li.pdf-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.75rem 0.9rem;
      }
      .pdf-item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .pdf-item-name {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        min-width: 0;
      }
      .pdf-item-name span.icon { font-size: 1rem; flex-shrink: 0; }
      .pdf-item-name strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pdf-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }
      .btn-pdf {
        padding: 0.3rem 0.65rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        font-family: 'Inter', sans-serif;
      }
      .btn-pdf:hover { background: var(--teal); border-color: var(--teal); color: #fff; }
      .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-pdf-del {
        padding: 0.3rem 0.55rem;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 0.9rem;
        cursor: pointer;
        transition: color 0.15s;
        line-height: 1;
      }
      .btn-pdf-del:hover { color: #EF4444; }

      .col-right { flex: 1; min-width: 0; }
      #pdf-viewer-area { margin-bottom: 1.5rem; }

      .records-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .records-title {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .table-wrap {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      #tabela-gastos {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
      }
      #tabela-gastos thead tr {
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      #tabela-gastos th {
        padding: 0.75rem 0.9rem;
        text-align: left;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
      }
      #tabela-gastos tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }
      #tabela-gastos tbody tr:last-child { border-bottom: none; }
      #tabela-gastos tbody tr:hover { background: var(--surface2); }
      #tabela-gastos td {
        padding: 0.5rem 0.9rem;
        vertical-align: top;
      }
      #tabela-gastos td input,
      #tabela-gastos td textarea {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        resize: vertical;
        min-height: 60px;
        padding: 0.25rem 0;
        transition: background 0.1s;
      }
      #tabela-gastos td input[type="date"] {
        min-height: unset;
        color-scheme: dark;
      }
      #tabela-gastos td input:focus,
      #tabela-gastos td textarea:focus {
        background: rgba(13,148,136,0.05);
        border-radius: 4px;
        padding: 0.25rem 0.4rem;
      }
      #tabela-gastos td.cell-action {
        text-align: center;
        vertical-align: middle;
        width: 48px;
      }
      .btn-remove-row {
        background: transparent;
        border: 1px solid #374151;
        color: var(--muted);
        border-radius: 6px;
        padding: 0.25rem 0.5rem;
        cursor: pointer;
        font-size: 0.8rem;
        transition: color 0.15s, border-color 0.15s;
        line-height: 1;
      }
      .btn-remove-row:hover { color: #EF4444; border-color: #EF4444; }

      #btn-add-row {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-family: 'Inter', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }
      #btn-add-row:hover { border-color: var(--teal); color: var(--teal-lt); }

      .pdf-preview-container {
        margin-top: 0.75rem;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .pdf-preview-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0.75rem;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        border-radius: 8px 8px 0 0;
      }
      .pdf-preview-toolbar span {
        font-size: 0.75rem;
        color: var(--muted);
        font-family: 'JetBrains Mono', monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pdf-preview-toolbar button {
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 0.8rem;
        cursor: pointer;
        flex-shrink: 0;
        margin-left: 0.5rem;
        font-family: 'Inter', sans-serif;
      }
      .pdf-preview-toolbar button:hover { color: var(--text); }
      .pdf-preview-container iframe {
        width: 100%;
        height: 75vh;
        min-height: 500px;
        border: none;
        display: block;
        background: #fff;
        border-radius: 0 0 8px 8px;
      }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">Gerenciador de Imóveis</span>
      <nav>
        <a href="main.html">Início</a>
        <a href="propriedades.html">Propriedades</a>
        <a href="login.html" data-action="sair" class="danger">Sair</a>
      </nav>
    </header>

    <main>
      <!-- ── LEFT ── -->
      <div class="col-left">
        <div class="imovel-header">
          <div class="text-4xl bg-teal-400 rounded-lg px-2 font-mono font-bold uppercase" style="
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            line-height: 1.4;
          ">Nome do imóvel</div>
          <div id="info-inquilino"></div>
        </div>

        <div class="photo-wrap">
          <img id="foto-imovel" src="images/vector1.jpg" alt="Foto do imóvel">
        </div>
        <label id="label-foto">
          ✎ Alterar foto
          <input type="file" id="input-foto" accept="image/jpeg,image/png,image/webp" class="hidden">
        </label>

        <!-- PDF -->
        <div class="pdf-section">
          <div class="section-title">Arquivos PDF</div>

          <form id="form-arquivo" class="pdf-form">
            <div>
              <label class="field-label">Nome do arquivo</label>
              <input name="nome" type="text" placeholder="Ex: Contrato de locação">
            </div>
            <div>
              <label class="field-label">Selecionar PDF <span style="font-weight:400;opacity:.6">(máx. 20 MB)</span></label>
              <label class="file-pick-label">
                <span style="font-size:1rem">📎</span>
                <span id="label-pdf-texto">Clique para selecionar…</span>
                <input type="file" name="pdf" id="input-pdf" accept="application/pdf,.pdf" class="hidden">
              </label>
            </div>

            <div id="progresso-upload">
              <div class="bar-bg">
                <div id="barra-progresso"></div>
              </div>
              <p id="texto-progresso">Enviando…</p>
            </div>

            <button type="submit" id="btn-upload-pdf">⬆ Adicionar PDF</button>
          </form>

          <ul id="lista-arquivos"></ul>
        </div>
      </div>

      <!-- ── RIGHT ── -->
      <div class="col-right">
        <!-- PDF preview renders here so it has full width -->
        <div id="pdf-viewer-area"></div>
        <div class="records-header">
          <div class="records-title">Registros</div>
        </div>
        <div class="table-wrap">
          <table id="tabela-gastos">
            <thead>
              <tr>
                <th>Inquilino</th>
                <th>Data</th>
                <th>O que foi feito?</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </main>

    <script src="../js/utils.js"></script>
    <script src="../js/imovel.js"></script>

    <script>
      document.getElementById('input-pdf')?.addEventListener('change', function () {
        const labelTexto = document.getElementById('label-pdf-texto');
        if (this.files[0]) {
          const tamanho = (this.files[0].size / 1024 / 1024).toFixed(2);
          labelTexto.textContent = this.files[0].name + ' (' + tamanho + ' MB)';
          labelTexto.style.color = '';
        } else {
          labelTexto.textContent = 'Clique para selecionar…';
        }
      });
    </script>
  </body>
</html>
