<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Roboto', sans-serif; }
      body { background: #000; }

      .top-bar {
        background: #000;
        border-bottom: 2px solid #fff;
      }

      .accent-bar { width: 48px; height: 4px; background: #facc15; }

      .photo-frame {
        border: 2px solid #fff;
        overflow: hidden;
        position: relative;
      }
      .photo-frame img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
        filter: grayscale(15%) contrast(1.1);
        transition: transform 0.4s;
      }
      .photo-frame:hover img { transform: scale(1.03); }

      .photo-tag {
        position: absolute;
        top: 14px; left: 14px;
        background: #facc15;
        color: #000;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 4px 10px;
      }

      /* Table panel */
      .panel {
        background: #111;
        border: 2px solid #fff;
      }

      .panel-header {
        background: #fff;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .log-table { width: 100%; border-collapse: collapse; }

      .log-table thead th {
        background: #1a1a1a;
        color: #aaa;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 12px 16px;
        text-align: left;
        border-bottom: 2px solid #333;
      }

      .log-table tbody tr { border-bottom: 1px solid #222; }
      .log-table tbody tr:last-child { border-bottom: none; }
      .log-table tbody tr:hover { background: #1a1a1a; }

      .log-table tbody td { padding: 12px 16px; vertical-align: top; }

      .cell-input {
        background: transparent;
        border: none;
        color: #fff;
        font-family: 'Roboto', sans-serif;
        font-size: 13px;
        width: 100%;
        resize: vertical;
        min-height: 60px;
        outline: none;
        line-height: 1.6;
      }
      .cell-input::placeholder { color: #444; }
      .cell-input:focus { color: #facc15; }

      input[type="date"].cell-date {
        background: transparent;
        border: none;
        color: #aaa;
        font-family: 'Roboto', sans-serif;
        font-size: 12px;
        outline: none;
        cursor: pointer;
      }
      input[type="date"].cell-date:focus { color: #facc15; }
      input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

      .row-num {
        width: 28px; height: 28px;
        background: #facc15;
        color: #000;
        font-size: 11px;
        font-weight: 900;
        display: flex; align-items: center; justify-content: center;
      }

      .btn-back {
        color: #aaa;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-decoration: none;
        transition: color 0.15s;
      }
      .btn-back:hover { color: #facc15; }

      .section-label {
        color: #facc15;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .ani { animation: fadeUp 0.45s ease forwards; opacity: 0; }
      .d1 { animation-delay: 0.05s; }
      .d2 { animation-delay: 0.15s; }
      .d3 { animation-delay: 0.25s; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">

    <header class="top-bar w-full px-8 py-4 flex items-center justify-between sticky top-0 z-50">
      <div class="flex items-center gap-4">
        <div class="accent-bar"></div>
        <span class="text-white text-lg font-black uppercase tracking-widest">Gerenciador de Imóveis</span>
      </div>
      <a href="main.html" class="btn-back">← Voltar</a>
    </header>

    <main class="flex-1 px-8 py-12 max-w-6xl mx-auto w-full">

      <div class="mb-8 ani d1">
        <p class="section-label mb-2">Detalhes</p>
        <h1 class="text-white text-5xl font-black uppercase leading-none">Nome do<br>Imóvel</h1>
        <div class="mt-4 h-0.5 bg-white w-32"></div>
      </div>

      <div class="flex flex-col lg:flex-row gap-8">

        <!-- Photo -->
        <div class="lg:w-2/5 ani d2">
          <div class="photo-frame" style="height: 340px;">
            <img src="vector1.jpg" alt="Foto do imóvel">
            <div class="photo-tag">📍 Endereço</div>
          </div>
        </div>

        <!-- Table -->
        <div class="lg:w-3/5 ani d3">
          <div class="panel">
            <div class="panel-header">
              <div>
                <p class="text-black text-sm font-black uppercase tracking-wide">Histórico de Registros</p>
                <p class="text-neutral-600 text-xs font-medium mt-0.5">Inquilinos · datas · ocorrências</p>
              </div>
              <span class="bg-black text-yellow-400 text-xs font-bold uppercase tracking-wider px-3 py-1">3 entradas</span>
            </div>

            <table class="log-table">
              <thead>
                <tr>
                  <th style="width:44px">#</th>
                  <th>Inquilino</th>
                  <th>Data</th>
                  <th>O que foi feito?</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><div class="row-num">1</div></td>
                  <td><textarea class="cell-input" placeholder="Nome…"></textarea></td>
                  <td><input type="date" class="cell-date"></td>
                  <td><textarea class="cell-input" placeholder="Descreva…"></textarea></td>
                </tr>
                <tr>
                  <td><div class="row-num">2</div></td>
                  <td><textarea class="cell-input" placeholder="Nome…"></textarea></td>
                  <td><input type="date" class="cell-date"></td>
                  <td><textarea class="cell-input" placeholder="Descreva…"></textarea></td>
                </tr>
                <tr>
                  <td><div class="row-num">3</div></td>
                  <td><textarea class="cell-input" placeholder="Nome…"></textarea></td>
                  <td><input type="date" class="cell-date"></td>
                  <td><textarea class="cell-input" placeholder="Descreva…"></textarea></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>

    <footer class="py-4 text-center text-xs text-neutral-700 border-t border-neutral-900">
      © 2025 · Gerenciador de Imóveis
    </footer>

    <script src="utils.js"></script>
    <script src="imovel.js"></script>
  </body>
</html>
