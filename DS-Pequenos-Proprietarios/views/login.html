<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-black flex flex-col items-center min-h-screen">
    <div class="bg-teal-400 w-full h-24 flex shadow-lg">
      <span class="text-4xl text-black font-mono font-bold pt-6 pl-4 uppercase">gerenciador de imóveis</span>
    </div>

    <div class="mt-10 flex gap-4">
      <button type="button" data-tab="login" class="tab-btn text-xl font-mono font-bold px-6 py-2 rounded bg-teal-400 hover:bg-teal-500 text-black">Entrar</button>
      <button type="button" data-tab="cadastro" class="tab-btn text-xl font-mono font-bold px-6 py-2 rounded bg-teal-400 hover:bg-teal-500 text-black">Cadastrar</button>
    </div>

    <!-- Login --> 
    <div id="painel-login" class="flex bg-teal-400 w-140 mt-8 rounded-lg flex-col justify-center p-10">
      <div class="text-3xl text-black font-mono font-bold uppercase text-center mb-8">Entre no sistema!</div>
      <form id="form-login" class="flex flex-col gap-4">
        <div>
          <label class="text-xl text-black font-mono font-bold uppercase">CPF</label>
          <input type="text" name="cpf" class="w-full text-xl text-black font-mono bg-teal-500 rounded-md px-3 py-2 mt-1">
        </div>
        <div>
          <label class="text-xl text-black font-mono font-bold uppercase">Senha</label>
          <input type="password" name="senha" class="w-full text-xl text-black font-mono bg-teal-500 rounded-md px-3 py-2 mt-1">
        </div>
        <button type="submit" class="text-xl text-black font-mono font-bold uppercase bg-teal-500 rounded-md py-3 mt-2 hover:bg-teal-600">Entrar</button>
      </form>
    </div>

    <!-- Cadastro -->
    <div id="painel-cadastro" class="hidden flex bg-teal-400 w-140 mt-8 rounded-lg flex-col justify-center p-10">
      <div class="text-3xl text-black font-mono font-bold uppercase text-center mb-6">Criar conta</div>

      <div class="flex gap-3 mb-6 justify-center">
        <label class="text-black font-mono font-bold flex items-center gap-2">
          <input type="radio" name="tipo" value="proprietario" checked> Proprietário
        </label>
        <label class="text-black font-mono font-bold flex items-center gap-2">
          <input type="radio" name="tipo" value="inquilino"> Inquilino
        </label>
      </div>

      <form id="form-cadastro" class="flex flex-col gap-4">
        <div>
          <label class="text-xl text-black font-mono font-bold uppercase">Nome completo</label>
          <input type="text" name="nome" class="w-full text-xl text-black font-mono bg-teal-500 rounded-md px-3 py-2 mt-1">
        </div>
        <div id="campo-email" class="hidden">
          <label class="text-xl text-black font-mono font-bold uppercase">E-mail</label>
          <input type="email" name="email" class="w-full text-xl text-black font-mono bg-teal-500 rounded-md px-3 py-2 mt-1">
        </div>
        <div>
          <label class="text-xl text-black font-mono font-bold uppercase">CPF</label>
          <input type="text" name="cpf" class="w-full text-xl text-black font-mono bg-teal-500 rounded-md px-3 py-2 mt-1">
        </div>
        <div>
          <label class="text-xl text-black font-mono font-bold uppercase">Senha</label>
          <input type="password" name="senha" class="w-full text-xl text-black font-mono bg-teal-500 rounded-md px-3 py-2 mt-1">
        </div>
        <button type="submit" class="text-xl text-black font-mono font-bold uppercase bg-teal-500 rounded-md py-3 mt-2 hover:bg-teal-600">Cadastrar</button>
      </form>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
