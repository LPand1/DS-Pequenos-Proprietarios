<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Imóveis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0A0A0A;
        --surface:  #111111;
        --surface2: #1A1A1A;
        --border:   #2A2A2A;
        --teal:     #0D9488;
        --teal-lt:  #2DD4BF;
        --text:     #F0F0F0;
        --muted:    #6B7280;
        --danger:   #EF4444;
        --radius:   10px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 2rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .logo {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--teal-lt);
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2.5rem 2rem;
      }

      .card-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
        color: var(--text);
      }
      .card-sub {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 2rem;
      }

      .tabs {
        display: flex;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px;
        background: var(--surface2);
        margin-bottom: 2rem;
      }
      .tab-btn {
        flex: 1;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .tab-btn.active, .tab-btn:hover {
        background: var(--teal);
        color: #fff;
      }

      .field { margin-bottom: 1.25rem; }
      label.field-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }
      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        padding: 0.65rem 0.85rem;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus { border-color: var(--teal); }

      .radio-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .radio-label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.875rem;
        color: var(--muted);
        cursor: pointer;
        font-weight: 500;
      }
      .radio-label input { accent-color: var(--teal); }

      .btn-primary {
        width: 100%;
        padding: 0.75rem;
        background: var(--teal);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
        margin-top: 0.5rem;
      }
      .btn-primary:hover { background: #0F766E; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">Gerenciador de Imóveis</span>
    </header>

    <main>
      <div class="card">
        <div class="card-title">Bem-vindo de volta</div>
        <div class="card-sub">Acesse sua conta ou crie uma nova</div>

        <div class="tabs">
          <button type="button" data-tab="login" class="tab-btn active">Entrar</button>
          <button type="button" data-tab="cadastro" class="tab-btn">Cadastrar</button>
        </div>

        <!-- Login -->
        <div id="painel-login">
          <form id="form-login">
            <div class="field">
              <label class="field-label">CPF</label>
              <input type="text" name="cpf" placeholder="000.000.000-00">
            </div>
            <div class="field">
              <label class="field-label">Senha</label>
              <input type="password" name="senha" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
          </form>
        </div>

        <!-- Cadastro -->
        <div id="painel-cadastro" class="hidden">
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="tipo" value="proprietario" checked> Proprietário
            </label>
            <label class="radio-label">
              <input type="radio" name="tipo" value="inquilino"> Inquilino
            </label>
          </div>
          <form id="form-cadastro">
            <div class="field">
              <label class="field-label">Nome completo</label>
              <input type="text" name="nome" placeholder="Seu nome">
            </div>
            <div id="campo-email" class="field hidden">
              <label class="field-label">E-mail</label>
              <input type="email" name="email" placeholder="seu@email.com">
            </div>
            <div class="field">
              <label class="field-label">CPF</label>
              <input type="text" name="cpf" placeholder="000.000.000-00">
            </div>
            <div class="field">
              <label class="field-label">Senha</label>
              <input type="password" name="senha" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Criar conta</button>
          </form>
        </div>
      </div>
    </main>

    <script src="../js/utils.js"></script>
    <script src="../js/login.js"></script>
    <script>
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          document.getElementById('painel-login').classList.toggle('hidden', tab !== 'login');
          document.getElementById('painel-cadastro').classList.toggle('hidden', tab !== 'cadastro');
        });
      });
    </script>
  </body>
</html>
