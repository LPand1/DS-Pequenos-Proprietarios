<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Roboto', sans-serif; }
      body { background: #000; }

      .card {
        background: #111;
        border: 2px solid #fff;
        box-shadow: 8px 8px 0 #facc15;
      }

      .input-field {
        background: #000;
        border: 2px solid #444;
        color: #fff;
        font-family: 'Roboto', sans-serif;
        font-size: 15px;
        transition: border-color 0.15s;
      }
      .input-field::placeholder { color: #444; }
      .input-field:focus {
        outline: none;
        border-color: #facc15;
        box-shadow: 0 0 0 3px rgba(250,204,21,0.15);
      }

      .btn-primary {
        background: #facc15;
        color: #000;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        border: 2px solid #facc15;
        transition: all 0.15s;
      }
      .btn-primary:hover {
        background: #000;
        color: #facc15;
        transform: translate(-3px, -3px);
        box-shadow: 5px 5px 0 #facc15;
      }
      .btn-primary:active { transform: translate(0,0); box-shadow: none; }

      .accent-bar { width: 48px; height: 4px; background: #facc15; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .ani { animation: fadeUp 0.45s ease forwards; opacity: 0; }
      .d1 { animation-delay: 0.05s; }
      .d2 { animation-delay: 0.15s; }
      .d3 { animation-delay: 0.25s; }
      .d4 { animation-delay: 0.35s; }

      label { color: #aaa; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; display: block; margin-bottom: 8px; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">

    <header class="w-full px-8 py-5 flex items-center gap-4 border-b border-neutral-900">
      <div class="accent-bar"></div>
      <span class="text-white text-lg font-black uppercase tracking-widest">Gerenciador de Imóveis</span>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-16">
      <div class="card w-full max-w-sm p-10">

        <div class="mb-8 ani d1">
          <p class="text-yellow-400 text-xs font-bold uppercase tracking-widest mb-3">Acesso ao sistema</p>
          <h1 class="text-white text-4xl font-black uppercase leading-none">Entre<br>agora.</h1>
          <div class="mt-5 h-px bg-white/20"></div>
        </div>

        <form action="" method="POST" class="flex flex-col gap-5">
          <div class="ani d2">
            <label>Usuário</label>
            <input type="text" name="usuario" placeholder="seu.usuario" class="input-field w-full px-4 py-3">
          </div>
          <div class="ani d3">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="••••••••" class="input-field w-full px-4 py-3">
          </div>
          <div class="ani d4 pt-2">
            <button type="submit" class="btn-primary w-full py-4 text-sm">Entrar →</button>
          </div>
        </form>

      </div>
    </main>

    <footer class="py-4 text-center text-xs text-neutral-700 border-t border-neutral-900">
      © 2025 · Gerenciador de Imóveis
    </footer>

    <script src="utils.js"></script>
    <script src="login.js"></script>
  </body>
</html>
