<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Imóveis</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Roboto', sans-serif; }
      body { background: #000; }

      .top-bar {
        background: #000;
        border-bottom: 2px solid #fff;
      }

      .accent-bar { width: 48px; height: 4px; background: #facc15; }

      .prop-card {
        background: #111;
        border: 2px solid #fff;
        position: relative;
        overflow: hidden;
        transition: all 0.2s ease;
        display: block;
        cursor: pointer;
        text-decoration: none;
      }
      .prop-card:hover {
        border-color: #facc15;
        transform: translate(-4px, -4px);
        box-shadow: 6px 6px 0 #facc15;
      }
      .prop-card:hover .prop-img { transform: scale(1.06); }

      .prop-img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s ease;
        filter: grayscale(20%) contrast(1.1);
      }

      .prop-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(180deg, transparent 45%, rgba(0,0,0,0.92) 100%);
      }

      .prop-label {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 16px 18px;
      }

      .prop-badge {
        display: inline-block;
        background: #facc15;
        color: #000;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 2px 8px;
        margin-bottom: 6px;
      }

      .btn-back {
        color: #aaa;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.15s;
        text-decoration: none;
      }
      .btn-back:hover { color: #facc15; }

      .section-label {
        color: #facc15;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .prop-card { animation: fadeUp 0.45s ease forwards; opacity: 0; }
      .prop-card:nth-child(1) { animation-delay: 0.05s; }
      .prop-card:nth-child(2) { animation-delay: 0.15s; }
      .prop-card:nth-child(3) { animation-delay: 0.25s; }
      .prop-card:nth-child(4) { animation-delay: 0.35s; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">

    <header class="top-bar w-full px-8 py-4 flex items-center justify-between sticky top-0 z-50">
      <div class="flex items-center gap-4">
        <div class="accent-bar"></div>
        <!--
          id="header-usuario" → main.js atualiza com "Olá, [nome] — Gerenciador de Imóveis"
        -->
        <span id="header-usuario" class="text-white text-lg font-black uppercase tracking-widest">
          Gerenciador de Imóveis
        </span>
      </div>
      <!--
        id="btn-sair" → main.js intercepta o clique, limpa Storage e redireciona
      -->
      <a href="login.html" id="btn-sair" class="btn-back">← Sair</a>
    </header>

    <main class="flex-1 px-8 py-12 max-w-5xl mx-auto w-full">

      <div class="mb-10">
        <p class="section-label mb-2">Portfólio</p>
        <h1 class="text-white text-5xl font-black uppercase leading-none">Seus<br>imóveis</h1>
        <div class="mt-4 h-0.5 bg-white w-32"></div>
      </div>

      <!--
        Cada card tem class="prop-card" → main.js itera por index (0-based → id 1-based).
        class="prop-nome" → main.js sobrescreve com o nome salvo no Storage, se houver.
        O href é ignorado; main.js usa e.preventDefault() e redireciona após salvar imovelAtivo.
      -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

        <a href="imovel.html" class="prop-card h-72">
          <img src="images/vector1.jpg" alt="Imóvel 1" class="prop-img">
          <div class="prop-overlay"></div>
          <div class="prop-label">
            <span class="prop-badge">Disponível</span>
            <p class="prop-nome text-white text-xl font-black uppercase">Imóvel 1</p>
            <p class="text-neutral-400 text-xs font-medium mt-0.5">Ver detalhes →</p>
          </div>
        </a>

        <a href="imovel.html" class="prop-card h-72">
          <img src="images/vector2.jpg" alt="Imóvel 2" class="prop-img">
          <div class="prop-overlay"></div>
          <div class="prop-label">
            <span class="prop-badge">Disponível</span>
            <p class="prop-nome text-white text-xl font-black uppercase">Imóvel 2</p>
            <p class="text-neutral-400 text-xs font-medium mt-0.5">Ver detalhes →</p>
          </div>
        </a>

        <a href="imovel.html" class="prop-card h-72">
          <img src="images/vector3.jpg" alt="Imóvel 3" class="prop-img">
          <div class="prop-overlay"></div>
          <div class="prop-label">
            <span class="prop-badge">Disponível</span>
            <p class="prop-nome text-white text-xl font-black uppercase">Imóvel 3</p>
            <p class="text-neutral-400 text-xs font-medium mt-0.5">Ver detalhes →</p>
          </div>
        </a>

        <a href="imovel.html" class="prop-card h-72">
          <img src="images/vector4.jpg" alt="Imóvel 4" class="prop-img">
          <div class="prop-overlay"></div>
          <div class="prop-label">
            <span class="prop-badge">Disponível</span>
            <p class="prop-nome text-white text-xl font-black uppercase">Imóvel 4</p>
            <p class="text-neutral-400 text-xs font-medium mt-0.5">Ver detalhes →</p>
          </div>
        </a>

      </div>
    </main>

    <footer class="py-4 text-center text-xs text-neutral-700 border-t border-neutral-900">
      © 2025 · Gerenciador de Imóveis
    </footer>

    <script src="utils.js"></script>
    <script src="main.js"></script>
  </body>
</html>
