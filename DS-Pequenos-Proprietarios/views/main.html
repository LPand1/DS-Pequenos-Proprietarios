<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Início — Gerenciador de Imóveis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:       #0A0A0A;
        --surface:  #111111;
        --surface2: #1A1A1A;
        --border:   #2A2A2A;
        --teal:     #0D9488;
        --teal-lt:  #2DD4BF;
        --text:     #F0F0F0;
        --muted:    #6B7280;
        --radius:   12px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .logo {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--teal-lt);
      }
      nav { display: flex; gap: 1.5rem; align-items: center; }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.15s;
      }
      nav a:hover { color: var(--text); }
      nav a.danger:hover { color: #EF4444; }

      main { flex: 1; padding: 2.5rem 2rem; }
      .page-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .page-sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 2rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 260px));
        gap: 1.5rem;
      }
      .imovel-card {
        width: 260px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition: border-color 0.2s, transform 0.2s;
        text-decoration: none;
        display: block;
      }
      .imovel-card:hover {
        border-color: var(--teal);
        transform: translateY(-3px);
      }
      .imovel-card img {
        width: 260px;
        height: 160px;
        object-fit: cover;
        display: block;
      }
      .imovel-card .card-label {
        padding: 0.85rem 1rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .imovel-card .card-label::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--teal);
        flex-shrink: 0;
      }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">Gerenciador de Imóveis</span>
      <nav>
        <a href="propriedades.html">Propriedades</a>
        <a href="inquilinos.html">Inquilinos</a>
        <a href="login.html" data-action="sair" class="danger">Sair</a>
      </nav>
    </header>

    <main>
      <div class="page-title">Seus imóveis</div>
      <div class="page-sub">Selecione um imóvel para gerenciar registros e documentos.</div>
      <div class="grid"></div>
    </main>

    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
