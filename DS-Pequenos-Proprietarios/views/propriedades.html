<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-black flex flex-col min-h-screen">
    <div class="bg-teal-400 w-full h-24 flex justify-between shadow-lg">
      <span class="text-4xl text-white font-mono font-bold pl-4 pt-6 uppercase">gerenciador de imóveis</span>
      <div class="flex gap-6 pt-8 pr-10">
        <a href="main.html" class="text-white text-xl font-mono font-bold hover:text-slate-200">Início</a>
        <a href="inquilinos.html" class="text-white text-xl font-mono font-bold hover:text-slate-200">Inquilinos</a>
        <a href="#" data-action="sair" class="text-white text-xl font-mono font-bold hover:text-slate-200">Sair</a>
      </div>
    </div>

    <div class="p-10 max-w-6xl mx-auto w-full">
      <h1 class="text-3xl text-teal-500 font-mono font-bold mb-6 uppercase">Propriedades</h1>
      <p id="aviso-inquilino" class="hidden text-teal-500 font-mono mb-4">Cadastro de imóveis disponível apenas para proprietários.</p>

      <form id="form-propriedade" class="bg-teal-400 p-6 rounded-lg mb-8 grid grid-cols-2 md:grid-cols-3 gap-4">
        <div>
          <label class="text-white font-mono font-bold block mb-1">Descrição</label>
          <input name="descricao" type="text" class="bg-teal-500 text-white font-mono px-3 py-2 rounded w-full">
        </div>
        <div>
          <label class="text-white font-mono font-bold block mb-1">Endereço</label>
          <input name="endereco" type="text" class="bg-teal-500 text-white font-mono px-3 py-2 rounded w-full">
        </div>
        <div>
          <label class="text-white font-mono font-bold block mb-1">Aluguel (R$)</label>
          <input name="aluguel" type="number" step="0.01" class="bg-teal-500 text-white font-mono px-3 py-2 rounded w-full">
        </div>
        <div>
          <label class="text-white font-mono font-bold block mb-1">Nome do Inquilino</label>
          <input name="inquilinoNome" type="text" list="lista-inquilinos" class="bg-teal-500 text-white font-mono px-3 py-2 rounded w-full" placeholder="Digite o nome cadastrado">
          <datalist id="lista-inquilinos"></datalist>
        </div>
        <div>
          <label class="text-white font-mono font-bold block mb-1">Tipo</label>
          <select name="tipo" class="bg-teal-500 text-white font-mono px-3 py-2 rounded w-full">
            <option value="1">Apartamento</option>
            <option value="2">Casa</option>
            <option value="3">Comercial</option>
          </select>
        </div>
        <div class="flex items-end">
          <button type="submit" class="bg-teal-500 text-white font-mono font-bold px-6 py-2 rounded hover:bg-teal-600 w-full">Adicionar</button>
        </div>
      </form>

      <table id="tabela-propriedades" class="w-full bg-teal-400">
        <thead>
          <tr class="bg-teal-400">
            <th class="text-white font-mono font-bold px-3 py-2">ID</th>
            <th class="text-white font-mono font-bold px-3 py-2">Descrição</th>
            <th class="text-white font-mono font-bold px-3 py-2">Inquilino</th>
            <th class="text-white font-mono font-bold px-3 py-2">Endereço</th>
            <th class="text-white font-mono font-bold px-3 py-2">Aluguel</th>
            <th class="text-white font-mono font-bold px-3 py-2">Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/crud.js"></script>
    <script src="../js/propriedades.js"></script>
  </body>
</html>
