<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Propriedades — Gerenciador de Imóveis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:       #0A0A0A;
        --surface:  #111111;
        --surface2: #1A1A1A;
        --border:   #2A2A2A;
        --teal:     #0D9488;
        --teal-lt:  #2DD4BF;
        --text:     #F0F0F0;
        --muted:    #6B7280;
        --radius:   10px;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .logo {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--teal-lt);
      }
      nav { display: flex; gap: 1.5rem; align-items: center; }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.15s;
      }
      nav a:hover { color: var(--text); }
      nav a.danger:hover { color: #EF4444; }

      main { flex: 1; padding: 2.5rem 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }
      .page-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 2rem;
      }

      #aviso-inquilino {
        background: #1C1F26;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 1.5rem;
      }

      #form-propriedade {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.75rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
        align-items: end;
      }
      .field { display: flex; flex-direction: column; gap: 0.35rem; }
      .field label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .field input,
      .field select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        padding: 0.6rem 0.8rem;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      .field input:focus, .field select:focus { border-color: var(--teal); }
      .field select option { background: var(--surface2); }

      .btn-primary {
        padding: 0.65rem 1.25rem;
        background: var(--teal);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 0.875rem;
        cursor: pointer;
        transition: background 0.15s;
        align-self: end;
        height: 42px;
      }
      .btn-primary:hover { background: #0F766E; }

      .table-wrap {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
      }
      thead tr {
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      th {
        padding: 0.75rem 1rem;
        text-align: left;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: var(--surface2); }
      td {
        padding: 0.85rem 1rem;
        font-size: 0.875rem;
        color: var(--text);
      }
      td a {
        color: var(--teal-lt);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.8rem;
      }
      td a:hover { text-decoration: underline; }
      .btn-excluir {
        background: transparent;
        border: 1px solid #374151;
        color: #EF4444;
        border-radius: 6px;
        padding: 0.25rem 0.6rem;
        cursor: pointer;
        font-size: 0.8rem;
        margin-left: 0.5rem;
        transition: background 0.15s, border-color 0.15s;
      }
      .btn-excluir:hover { background: rgba(239,68,68,0.1); border-color: #EF4444; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">Gerenciador de Imóveis</span>
      <nav>
        <a href="main.html">Início</a>
        <a href="inquilinos.html">Inquilinos</a>
        <a href="#" data-action="sair" class="danger">Sair</a>
      </nav>
    </header>

    <main>
      <div class="page-title">Propriedades</div>

      <p id="aviso-inquilino" class="hidden">Cadastro de imóveis disponível apenas para proprietários.</p>

      <form id="form-propriedade">
        <div class="field">
          <label>Descrição</label>
          <input name="descricao" type="text">
        </div>
        <div class="field">
          <label>Endereço</label>
          <input name="endereco" type="text">
        </div>
        <div class="field">
          <label>Aluguel (R$)</label>
          <input name="aluguel" type="number" step="0.01">
        </div>
        <div class="field">
          <label>Inquilino</label>
          <input name="inquilinoNome" type="text" list="lista-inquilinos" placeholder="Nome cadastrado">
          <datalist id="lista-inquilinos"></datalist>
        </div>
        <div class="field">
          <label>Tipo</label>
          <select name="tipo">
            <option value="1">Apartamento</option>
            <option value="2">Casa</option>
            <option value="3">Comercial</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Adicionar</button>
      </form>

      <div class="table-wrap">
        <table id="tabela-propriedades">
          <thead>
            <tr>
              <th>ID</th>
              <th>Descrição</th>
              <th>Inquilino</th>
              <th>Endereço</th>
              <th>Aluguel</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    <script src="../js/utils.js"></script>
    <script src="../js/crud.js"></script>
    <script src="../js/propriedades.js"></script>
  </body>
</html>
