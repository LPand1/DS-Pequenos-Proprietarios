  <body class="bg-gray-200 flex flex-col items-center">

      <div class="text-4xl text-white font-mono font-bold uppercase pl-29 pb-15 ">Entre no sistema!</div>
      <div class="flex justify-center ">
        <form action="" method="POST">
          <label for="nome" class="text-2xl text-white font-mono font-bold uppercase">Usuário</label>
          <br>

          <br>
          <label for="nome" class="text-2xl text-white font-mono font-bold uppercase">Senha</label>
