<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-200 flex flex-col">
    <div class="bg-blue-800 w-full h-24 flex justify-between shadow-lg">
      <span class="text-4xl text-white font-mono font-bold pl-4 pt-6 uppercase">gerenciador de imóveis</span>
      <div class="flex gap-4 pt-8 pr-10 items-center">
        <a href="main.html" class="text-white text-lg font-mono font-bold hover:text-slate-200">Início</a>
        <a href="propriedades.html" class="text-white text-lg font-mono font-bold hover:text-slate-200">Propriedades</a>
        <a href="login.html" data-action="sair" class="text-white text-lg font-mono font-bold hover:text-slate-200">Sair</a>
      </div>
    </div>

    <div class="flex pt-10 px-10 flex-col lg:flex-row gap-10">
      <div class="lg:w-1/3">
        <span class="text-4xl bg-blue-800 rounded-lg px-2 text-white font-mono font-bold uppercase">Nome do imóvel</span>
        <p id="info-inquilino" class="text-blue-900 font-mono font-bold mt-3"></p>
        <img src="vector1.jpg" class="w-full max-w-md h-80 object-cover rounded-lg mt-4">

        <div class="mt-8 bg-blue-800 p-5 rounded-lg">
          <h2 class="text-2xl text-white font-mono font-bold mb-4 uppercase">Arquivos</h2>
          <form id="form-arquivo" class="flex flex-col gap-3 mb-4">
            <input name="nome" type="text" placeholder="Nome do arquivo" class="bg-blue-900 text-white font-mono px-3 py-2 rounded">
            <input name="path" type="text" placeholder="Caminho (ex: /docs/contrato.pdf)" class="bg-blue-900 text-white font-mono px-3 py-2 rounded">
            <button type="submit" class="bg-blue-900 text-white font-mono font-bold py-2 rounded hover:bg-blue-950">Adicionar arquivo</button>
          </form>
          <ul id="lista-arquivos" class="space-y-2"></ul>
        </div>
      </div>

      <div class="flex-1">
        <h2 class="text-2xl text-blue-900 font-mono font-bold mb-4 uppercase">Registros</h2>
        <table id="tabela-gastos" class="bg-blue-600 w-full">
          <tr class="bg-blue-800">
            <th class="text-white font-mono font-bold px-2 py-2">Inquilino</th>
            <th class="text-white font-mono font-bold px-2 py-2">Data</th>
            <th class="text-white font-mono font-bold px-2 py-2">O que foi feito?</th>
          </tr>
        </table>
      </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/imovel.js"></script>
  </body>
</html>
